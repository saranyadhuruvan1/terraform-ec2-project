name: Terraform Import

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      resource_address:
        description: "Terraform resource address"
        required: true
        type: string
      aws_id:
        description: "AWS resource ID"
        required: true
        type: string

jobs:
  import:
    runs-on: ubuntu-latest

    env:
      ENV: ${{ github.event.inputs.environment }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: environments/${{ env.ENV }}
        run: terraform init

      - name: Terraform Import
        working-directory: environments/${{ env.ENV }}
        run: terraform import "${{ github.event.inputs.resource_address }}" "${{ github.event.inputs.aws_id }}"

      - name: Terraform Plan
        working-directory: environments/${{ env.ENV }}
        run: terraform plan -var-file=${{ env.ENV }}.tfvars
